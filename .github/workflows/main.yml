name: Build GestAge APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: List files to debug
        run: find . -name "gradlew" -o -name "build.gradle" | head -20

      - name: Make gradlew executable
        run: find . -name "gradlew" -exec chmod +x {} \;

      - name: Build Release APK
        run: |
          GRADLEW=$(find . -name "gradlew" | head -1)
          DIR=$(dirname $GRADLEW)
          cd $DIR && ./gradlew assembleRelease --stacktrace

      - name: Build Release AAB
        run: |
          GRADLEW=$(find . -name "gradlew" | head -1)
          DIR=$(dirname $GRADLEW)
          cd $DIR && ./gradlew bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GestAge-APK
          path: "**/app/build/outputs/apk/release/app-release.apk"

      - name: Upload AAB PlayStore
        uses: actions/upload-artifact@v4
        with:
          name: GestAge-AAB-PlayStore
          path: "**/app/build/outputs/bundle/release/app-release.aab"
