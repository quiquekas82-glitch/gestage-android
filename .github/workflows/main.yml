name: Build GestAge APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x gestage-android-project/gradlew

      - name: Build Release APK
        run: cd gestage-android-project && ./gradlew assembleRelease --stacktrace

      - name: Build Release AAB (Play Store)
        run: cd gestage-android-project && ./gradlew bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: GestAge-APK
          path: gestage-android-project/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB PlayStore
        uses: actions/upload-artifact@v3
        with:
          name: GestAge-AAB-PlayStore
          path: gestage-android-project/app/build/outputs/bundle/release/app-release.aab
